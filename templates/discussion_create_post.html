{% extends 'base.html' %}

{% block title %}New Post - {{ class_name }}{% endblock %}

{% block content %}
<div class="row align-items-center mb-4 mt-2">
  <div class="col-md-8">
    <h2 class="text-primary fw-bold mb-1">Create New Post</h2>
    <p class="text-muted mb-0">{{ class_name }}</p>
  </div>
  <div class="col-md-4 text-md-end mt-3 mt-md-0">
    <a href="{{ url_for('discussion_list', class_id=class_id) }}" class="btn btn-outline-secondary rounded-pill px-4 fw-semibold">
      Cancel
    </a>
  </div>
</div>

<div class="card shadow-sm border-0 rounded-3">
  <div class="card-body p-4">
    <form method="POST" action="{{ url_for('discussion_create_post', class_id=class_id) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="mb-3">
        <label class="form-label fw-semibold">Title</label>
        <input class="form-control bg-light" name="post_name" required maxlength="255" placeholder="e.g. Assignment 1 Q&A">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Description</label>
        <textarea class="form-control bg-light" name="post_description" rows="6" maxlength="4000" placeholder="Write details..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold">Create Post</button>
    </form>
  </div>
</div>
{% endblock %}
