{% extends 'base.html' %}

{% block title %}Login - LMS System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4 mt-5">
        <div class="card shadow border-0 rounded-3">
            <div class="card-header bg-white text-center py-4 border-0">
                <h3 class="mb-0 text-primary fw-bold">Login to LMS</h3>
                <p class="text-muted mt-2 mb-0">Enter your credentials to continue</p>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('login') }}" method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Username</label>
                        <input type="text" class="form-control form-control-lg bg-light" id="username" name="username" placeholder="e.g. an.nguyen" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <input type="password" class="form-control form-control-lg bg-light" id="password" name="password" placeholder="••••••••" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold">Sign In</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
